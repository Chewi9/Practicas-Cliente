<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Pruebas</title>
        <link href="Pruebas.css" rel="stylesheet"/>
    </head>

    <body>
        <header>
            <h1>Pruebas</h1>
        </header>

        <main>
            <h2>Tabla de inventario</h2>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Producto</th>
                        <th>Categoría</th>
                        <th>Precio</th>
                        <th>Algo</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>1</td>
                        <td>Producto 1</td>
                        <td>Categoría 1</td>
                        <td>$10.00</td>
                        <td>Algo 1</td>
                    </tr>

                    <tr>
                        <td>2</td>
                        <td>Producto 2</td>
                        <td>Categoría 2</td>
                        <td>$20.00</td>
                        <td>Algo 2</td>

                    </tr>

                    <tr>
                        <td>3</td>
                        <td>Producto 3</td>
                        <td>Categoría 1</td>
                        <td>$15.00</td>
                        <td>Algo 3</td>
                    </tr>
                </tbody>

                <tfoot>
                    <tr>
                        <td colspan="3">Total Stock:</td>
                        <td>3</td>
                    </tr>
                </tfoot>
            </table>

        </main>

        <form>
            <fieldset>
                <legend>Formulario de Registro</legend>

                <label for="nombre">Nombre:</label>
                <input type="text" placeholder="Ingrese el nombre" required id="nombre" name="nombre"></br>

                <label for="plataforma">Plataforma:</label>
                <select>
                    <option disabled selected></option>
                    <option value="pc">PC</option>
                    <option value="PlayStation">PlayStation</option>
                    <option value="Xbox">Xbox</option>
                    <option value="Nintendo">Nintendo</option>
                </select><br>

                <label for="precio">Precio:</label>
                <input type="number" placeholder="Ingrese el precio (0.00)" required id="precio" name="precio" min="0" step="0.01"><br>

                <label for="estado">Estado:</label>
                <input type="radio" id="nuevo" name="estado" value="nuevo">
                <label for="nuevo">Nuevo</label>
                <input type="radio" id="segunda" name="estado" value="segunda">
                <label for="segunda">Segunda mano</label><br>

                <label for="comentarios">Notas adicionales:</label>
                <textarea placeholder="Comente cualquier cosa" cols="20" rows="4"></textarea><br><br>

                <input type="submit" id="enviar" name="enviar" value="Enviar">
            </fieldset>
        </form>


        <footer>
            <p>Copyright &copy; 2024</p>
        </footer>
    </body>
</html>
