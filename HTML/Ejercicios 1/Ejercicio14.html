<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Ejercicio 14 - Tabla Periódica</title>
    <style>
        table { border-collapse: collapse; font-family: sans-serif; text-align: center; }
        td { border: 1px solid #333; width: 50px; height: 50px; }
        .vacio { border: none; } /* Clase para las celdas sin borde */
        .gas-noble { background-color: #fce4ec; }
        .alcalino { background-color: #e3f2fd; }
    </style>
</head>
<body>

    <h1>Tabla Periódica de los Elementos (Fragmento)</h1>

    <table>
        <tr>
            <td class="alcalino">1<br>H</td>
            <td colspan="16" class="vacio"></td>
            <td class="gas-noble">2<br>He</td>
        </tr>

        <tr>
            <td class="alcalino">3<br>Li</td>
            <td>4<br>Be</td>
            <td colspan="10" class="vacio"></td>
            <td>5<br>B</td>
            <td>6<br>C</td>
            <td>7<br>N</td>
            <td>8<br>O</td>
            <td>9<br>F</td>
            <td class="gas-noble">10<br>Ne</td>
        </tr>

        <tr>
            <td class="alcalino">11<br>Na</td>
            <td>12<br>Mg</td>
            <td colspan="10" class="vacio"></td>
            <td>13<br>Al</td>
            <td>14<br>Si</td>
            <td>15<br>P</td>
            <td>16<br>S</td>
            <td>17<br>Cl</td>
            <td class="gas-noble">18<br>Ar</td>
        </tr>
    </table>

</body>
</html>
